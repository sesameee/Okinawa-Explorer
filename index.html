  <body>
    <div id="root"></div>
    <script>
      // Extra mobile zoom guards (especially for iOS Safari)
      document.addEventListener(
        "gesturestart",
        function (e) {
          e.preventDefault();
        },
        { passive: false },
      );

      let lastTouchEnd = 0;
      document.addEventListener(
        "touchend",
        function (e) {
          const now = Date.now();
          if (now - lastTouchEnd <= 300) {
            e.preventDefault(); // prevent double-tap zoom
          }
          lastTouchEnd = now;
        },
        { passive: false },
      );
    </script>
